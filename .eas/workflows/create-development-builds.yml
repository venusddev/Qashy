name: Create Development Builds

# Development clients are needed on demand — a new native module, a new
# teammate, an expired build — not on every push to a working branch.
on:
  workflow_dispatch:

jobs:
  build_ios_development:
    name: Build iOS development client
    type: build
    params:
      platform: ios
      profile: development

  build_android_development:
    name: Build Android development client
    type: build
    params:
      platform: android
      profile: development
