name: Create Production Builds

# Releases are cut from a version tag, with a manual escape hatch. Deliberately
# not `push: branches: [main]` — every merge would ship a store submission.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS release
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android release
    type: build
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit iOS release
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  submit_android:
    name: Submit Android release
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
